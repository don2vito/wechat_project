<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动态化数据图表生成器 - 商务带箭头柱形图 V1.6 - 完美导出版</title>
    <!-- 引入 ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <!-- 引入 SheetJS 用于解析 Excel -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            min-height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding-top: 40px;
            padding-bottom: 40px;
        }

        .controls {
            margin-bottom: 20px;
            background: white;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            display: flex;
            gap: 20px;
            align-items: center;
            width: 900px;
            box-sizing: border-box;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="file"] {
            border: 2px dashed #ddd;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        input[type="file"]:hover {
            border-color: #4CAF50;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        #download-btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            margin-left: auto;
        }

        #download-btn:hover:not(:disabled) {
            box-shadow: 0 6px 20px rgba(17, 153, 142, 0.4);
        }

        #data-preview {
            display: none;
            margin-bottom: 20px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 900px;
            box-sizing: border-box;
        }

        #data-preview h3 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 16px;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        #preview-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }

        #preview-table th,
        #preview-table td {
            border: 1px solid #e0e0e0;
            padding: 10px 12px;
        }

        #preview-table th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
        }

        #preview-table tr:nth-child(even) {
            background-color: #f8f9fa;
        }

        #preview-table tr:hover {
            background-color: #e3f2fd;
        }

        #main {
            width: 900px;
            height: 600px;
            background-color: #ffffff;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            box-sizing: border-box;
        }

        /* 颜色配置面板样式 */
        #color-config-panel {
            display: none;
            margin-bottom: 20px;
            background: white;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 900px;
            box-sizing: border-box;
        }

        #color-config-panel h3 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 16px;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .color-picker-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
        }

        .color-picker-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f8f9fa;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }

        .color-picker-item label {
            font-size: 14px;
            font-weight: 600;
            color: #555;
            min-width: 80px;
        }

        .color-picker-item input[type="color"] {
            width: 50px;
            height: 35px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .color-value {
            font-size: 12px;
            color: #666;
            font-family: monospace;
            background: #e9ecef;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .toggle-color-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            font-size: 13px;
            padding: 8px 16px;
        }

        /* 对比度预览指示器 */
        .contrast-indicator {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            margin-left: 5px;
            border: 2px solid #ddd;
        }
    </style>
</head>

<body>
    <div class="controls">
        <div class="control-group">
            <label for="excel-file"><strong>📊 选择Excel:</strong></label>
            <input type="file" id="excel-file" accept=".xlsx, .xls">
        </div>
        
        <div class="control-group">
            <label for="theme-select"><strong>🎨 配色风格:</strong></label>
            <select id="theme-select" style="padding: 8px; border-radius: 6px; border: 1px solid #ddd; font-size: 14px;">
                <option value="business">红灰商务风格 (默认)</option>
                <option value="mckinsey_blue">麦肯锡经典蓝 (单色)</option>
                <option value="custom">自定义配色</option>
            </select>
        </div>

        <button id="toggle-color-btn" class="toggle-color-btn" style="display: none;">⚙️ 配置颜色</button>
        <button id="download-btn"><strong>📷 导出高清图片</strong></button>
    </div>

    <div id="color-config-panel">
        <h3>🎨 系列颜色自定义配置 (自动计算文字对比度)</h3>
        <div id="color-pickers-container" class="color-picker-container">
            <!-- 动态生成的颜色选择器将放在这里 -->
        </div>
    </div>

    <div id="data-preview">
        <h3>📄 数据预览 (前 5 行)</h3>
        <table id="preview-table">
            <thead id="preview-thead"></thead>
            <tbody id="preview-tbody"></tbody>
        </table>
    </div>

    <div id="main"></div>

    <script>
        // 初始化原图表时指定渲染器，确保和临时图表一致
        var chartDom = document.getElementById('main');
        var myChart = echarts.init(chartDom, null, {
            renderer: 'canvas', // 强制使用canvas渲染，避免svg差异
            width: 900,
            height: 600
        });
        var currentJsonData = null;
        var currentCategories = [];
        var customColors = {}; // 存储自定义颜色

        // 预设主题色彩搭配
        const colorThemes = {
            business: ['#c32026', '#f08994', '#f6b8c4', '#ffb74d', '#4db6ac', '#4fc3f7', '#ba68c8'],
            mckinsey_blue: ['#003b5c', '#1f70a9', '#5494c5', '#8eb6db', '#a3c6df', '#cddbed']
        };

        /**
         * 智能对比度计算函数
         * 根据背景色自动返回最佳文字颜色（黑或白）
         * 使用WCAG 2.0标准的相对亮度计算公式
         */
        function getContrastColor(bgColor) {
            if (!bgColor) return '#ffffff';
            
            bgColor = bgColor.toString().replace('#', '');
            
            if (bgColor.length === 3) {
                bgColor = bgColor[0] + bgColor[0] + bgColor[1] + bgColor[1] + bgColor[2] + bgColor[2];
            }
            
            if (bgColor.length !== 6) return '#ffffff';
            
            const r = parseInt(bgColor.substring(0, 2), 16) / 255.0;
            const g = parseInt(bgColor.substring(2, 4), 16) / 255.0;
            const b = parseInt(bgColor.substring(4, 6), 16) / 255.0;
            
            function getLuminance(c) {
                if (c <= 0.03928) {
                    return c / 12.92;
                } else {
                    return Math.pow((c + 0.055) / 1.055, 2.4);
                }
            }
            
            const luminance = 0.2126 * getLuminance(r) + 
                             0.7152 * getLuminance(g) + 
                             0.0722 * getLuminance(b);
            
            return luminance > 0.5 ? '#000000' : '#ffffff';
        }

        /**
         * 格式化时间戳为指定格式
         * 格式：年月日_时分秒
         */
        function formatTimestamp(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            return `${year}${month}${day}_${hours}${minutes}${seconds}`;
        }

        /**
         * 生成带时间戳的文件名
         */
        function generateFilename() {
            const timestamp = formatTimestamp(new Date());
            return `商务带箭头柱形图_${timestamp}.png`;
        }

        /**
         * 优化后的高分辨率图片导出功能
         * 核心改进：完全复刻原图表样式、确保所有元素渲染完成、同步颜色配置
         */
        document.getElementById('download-btn').addEventListener('click', async function () {
            if (!currentJsonData) {
                alert('请先上传数据！');
                return;
            }

            const btn = this;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<strong>⏳ 生成中...</strong>';
            btn.disabled = true;

            try {
                // 1. 先强制重绘原图表，确保状态最新
                myChart.resize();
                await new Promise(resolve => setTimeout(resolve, 200));

                // 2. 获取原图表的完整配置和尺寸
                const currentOption = JSON.parse(JSON.stringify(myChart.getOption()));
                const originalWidth = myChart.getWidth();
                const originalHeight = myChart.getHeight();

                // 3. 创建临时容器，完全复刻原容器的样式和尺寸
                const tempContainer = document.createElement('div');
                tempContainer.style.cssText = `
                    position: fixed;
                    left: -9999px;
                    top: -9999px;
                    width: ${originalWidth}px;
                    height: ${originalHeight}px;
                    background: #ffffff;
                    border-radius: 12px;
                    padding: 20px;
                    box-sizing: border-box;
                    z-index: -9999;
                `;
                document.body.appendChild(tempContainer);

                // 4. 初始化临时图表，参数与原图表完全一致
                const tempChart = echarts.init(tempContainer, null, {
                    renderer: 'canvas',
                    width: originalWidth,
                    height: originalHeight,
                    devicePixelRatio: window.devicePixelRatio || 1 // 适配屏幕DPR
                });

                // 5. 同步自定义颜色配置，确保主题一致
                const exportOption = {
                    ...currentOption,
                    animation: false, // 关闭动画确保立即渲染
                    animationDuration: 0,
                    animationEasingUpdate: 'linear'
                };

                // 6. 重新应用颜色配置（修复自定义颜色丢失问题）
                if (exportOption.series) {
                    exportOption.series.forEach((series, index) => {
                        if (series.name !== '总计辅助柱' && customColors[index]) {
                            series.itemStyle = series.itemStyle || {};
                            series.itemStyle.color = customColors[index];
                            // 同步文字对比度颜色
                            if (series.label) {
                                series.label.color = getContrastColor(customColors[index]);
                            }
                        }
                    });
                }

                // 7. 设置配置并等待渲染完成
                tempChart.setOption(exportOption, true);
                
                // 等待渲染完成（优先监听finished事件，增加超时保护）
                await new Promise((resolve) => {
                    let finished = false;
                    // 监听渲染完成事件
                    tempChart.on('finished', () => {
                        if (!finished) {
                            finished = true;
                            resolve();
                        }
                    });
                    // 超时保护（防止事件未触发）
                    setTimeout(() => {
                        if (!finished) {
                            finished = true;
                            resolve();
                        }
                    }, 800);
                });

                // 8. 额外等待确保graphic元素（箭头/增长率）完全渲染
                await new Promise(resolve => setTimeout(resolve, 300));

                // 9. 高清导出配置（适配不同屏幕）
                const pixelRatio = Math.max(window.devicePixelRatio || 2, 3); // 最低2倍，最高3倍
                const url = tempChart.getDataURL({
                    type: 'png',
                    pixelRatio: pixelRatio,
                    backgroundColor: '#ffffff',
                    excludeComponents: ['toolbox'],
                    // 确保导出区域覆盖完整容器
                    width: originalWidth,
                    height: originalHeight
                });

                // 10. 触发下载
                const filename = generateFilename();
                const a = document.createElement('a');
                a.download = filename;
                a.href = url;
                a.style.display = 'none';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                // 11. 清理临时资源（防止内存泄漏）
                tempChart.dispose();
                document.body.removeChild(tempContainer);

            } catch (error) {
                console.error('导出失败:', error);
                alert('导出失败，请重试！错误信息：' + error.message);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        // 渲染表格预览
        function renderTablePreview(dataArray) {
            const previewDiv = document.getElementById('data-preview');
            const thead = document.getElementById('preview-thead');
            const tbody = document.getElementById('preview-tbody');

            thead.innerHTML = '';
            tbody.innerHTML = '';

            if (dataArray.length === 0) return;

            const headers = dataArray[0] || [];
            let theadHtml = '<tr>';
            headers.forEach(h => {
                theadHtml += `<th>${h || ''}</th>`;
            });
            theadHtml += '</tr>';
            thead.innerHTML = theadHtml;

            const rows = dataArray.slice(1, 6);
            let tbodyHtml = '';
            rows.forEach(row => {
                tbodyHtml += '<tr>';
                headers.forEach((_, index) => {
                    const cellData = row[index] !== undefined && row[index] !== null ? row[index] : '';
                    tbodyHtml += `<td>${cellData}</td>`;
                });
                tbodyHtml += '</tr>';
            });
            tbody.innerHTML = tbodyHtml;
            previewDiv.style.display = 'block';
        }

        // 生成颜色配置面板
        function generateColorPickers(categories) {
            const container = document.getElementById('color-pickers-container');
            container.innerHTML = '';

            const currentTheme = document.getElementById('theme-select').value;
            let defaultColors;
            if (currentTheme === 'custom' && Object.keys(customColors).length > 0) {
                defaultColors = categories.map((_, i) => customColors[i] || colorThemes.business[i % colorThemes.business.length]);
            } else {
                defaultColors = categories.map((_, i) => {
                    const themeColors = colorThemes[currentTheme] || colorThemes.business;
                    return themeColors[i % themeColors.length];
                });
            }

            categories.forEach((cat, index) => {
                const item = document.createElement('div');
                item.className = 'color-picker-item';
                
                const label = document.createElement('label');
                label.textContent = cat;
                
                const colorInput = document.createElement('input');
                colorInput.type = 'color';
                colorInput.value = defaultColors[index];
                colorInput.dataset.index = index;
                
                const colorValue = document.createElement('span');
                colorValue.className = 'color-value';
                colorValue.textContent = defaultColors[index];
                
                const contrastIndicator = document.createElement('div');
                contrastIndicator.className = 'contrast-indicator';
                const contrastColor = getContrastColor(defaultColors[index]);
                contrastIndicator.style.backgroundColor = defaultColors[index];
                contrastIndicator.style.color = contrastColor;
                contrastIndicator.textContent = contrastColor === '#ffffff' ? '白' : '黑';
                contrastIndicator.title = '自动计算的文字颜色';
                
                colorInput.addEventListener('input', function() {
                    colorValue.textContent = this.value;
                    customColors[index] = this.value;
                    
                    const newContrastColor = getContrastColor(this.value);
                    contrastIndicator.style.backgroundColor = this.value;
                    contrastIndicator.style.color = newContrastColor;
                    contrastIndicator.textContent = newContrastColor === '#ffffff' ? '白' : '黑';
                    
                    if (currentJsonData) {
                        renderChartFromExcel(currentJsonData);
                    }
                });
                
                item.appendChild(label);
                item.appendChild(colorInput);
                item.appendChild(colorValue);
                item.appendChild(contrastIndicator);
                container.appendChild(item);
            });

            categories.forEach((_, i) => {
                if (!customColors[i]) {
                    customColors[i] = defaultColors[i];
                }
            });
        }

        // 切换颜色配置面板显示
        document.getElementById('toggle-color-btn').addEventListener('click', function() {
            const panel = document.getElementById('color-config-panel');
            if (panel.style.display === 'none' || panel.style.display === '') {
                panel.style.display = 'block';
                this.textContent = '⚙️ 隐藏配置';
            } else {
                panel.style.display = 'none';
                this.textContent = '⚙️ 配置颜色';
            }
        });

        // 监听主题切换
        document.getElementById('theme-select').addEventListener('change', function() {
            const toggleBtn = document.getElementById('toggle-color-btn');
            const panel = document.getElementById('color-config-panel');
            
            if (this.value === 'custom') {
                toggleBtn.style.display = 'inline-block';
                if (currentCategories.length > 0) {
                    generateColorPickers(currentCategories);
                }
            } else {
                toggleBtn.style.display = 'none';
                panel.style.display = 'none';
                customColors = {};
            }
            
            if (currentJsonData) {
                renderChartFromExcel(currentJsonData);
            }
        });

        // Excel 文件上传处理
        document.getElementById('excel-file').addEventListener('change', function(e) {
            var file = e.target.files[0];
            if (!file) return;

            var reader = new FileReader();
            reader.onload = function(e) {
                var data = new Uint8Array(e.target.result);
                var workbook = XLSX.read(data, { type: 'array' });
                var firstSheetName = workbook.SheetNames[0];
                var worksheet = workbook.Sheets[firstSheetName];
                var json = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                json = json.filter(row => row.length > 0 && row.some(cell => cell !== undefined && cell !== null && cell !== ''));

                if (json.length > 1) {
                    currentJsonData = json;
                    
                    const headers = json[0];
                    currentCategories = headers.slice(1);
                    
                    if (document.getElementById('theme-select').value === 'custom') {
                        generateColorPickers(currentCategories);
                        document.getElementById('toggle-color-btn').style.display = 'inline-block';
                    }
                    
                    renderTablePreview(json);
                    renderChartFromExcel(json);
                } else {
                    alert("提示: Excel 内容为空或格式不正确。请确保第一行为表头，往下为数据。");
                }
            };
            reader.readAsArrayBuffer(file);
        });

        function renderChartFromExcel(dataArray) {
            const currentTheme = document.getElementById('theme-select').value;
            let activeColors;
            
            if (currentTheme === 'custom') {
                activeColors = currentCategories.map((_, i) => customColors[i] || colorThemes.business[i % colorThemes.business.length]);
            } else {
                activeColors = colorThemes[currentTheme] || colorThemes.business;
            }

            const cleanDataArray = dataArray.filter(row => row.length > 0 && row[0] != null);

            const headers = cleanDataArray[0];
            const categories = headers.slice(1);

            const rows = cleanDataArray.slice(1);
            const years = rows.map(row => row[0]);

            const seriesData = categories.map((cat, index) => {
                return {
                    name: cat,
                    data: rows.map(row => Number(row[index + 1]) || 0)
                };
            });

            const totals = rows.map(row => {
                let sum = 0;
                for (let i = 1; i < row.length; i++) {
                    sum += (Number(row[i]) || 0);
                }
                return sum;
            });

            const seriesConfig = seriesData.map((sd, index) => {
                const bgColor = activeColors[index % activeColors.length];
                const textColor = getContrastColor(bgColor);
                
                return {
                    name: sd.name,
                    type: 'bar',
                    stack: 'total',
                    barWidth: 60,
                    itemStyle: { 
                        color: bgColor 
                    }, 
                    label: {
                        show: true,
                        position: 'inside',
                        formatter: '{c}',
                        color: textColor,
                        fontSize: 11,
                        fontWeight: 'bold',
                        textShadowColor: textColor === '#ffffff' ? 'rgba(0,0,0,0.3)' : 'rgba(255,255,255,0.5)',
                        textShadowBlur: 2,
                        textShadowOffsetY: 1
                    },
                    data: sd.data
                };
            });

            seriesConfig.push({
                name: '总计辅助柱',
                type: 'bar',
                stack: 'total',
                itemStyle: { color: 'transparent' },
                label: {
                    show: true,
                    position: 'top',
                    formatter: function (params) {
                        return totals[params.dataIndex];
                    },
                    color: '#333',
                    fontSize: 16,
                    fontWeight: 'bold'
                },
                data: Array(totals.length).fill(0)
            });

            const option = {
                animation: true, // 显示时保留动画
                legend: {
                    data: categories,
                    icon: 'square',
                    top: 15,
                    textStyle: { color: '#666', fontSize: 13 }
                },
                grid: {
                    left: '5%', right: '5%', bottom: '10%', top: '15%', containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: years,
                    axisLine: { lineStyle: { color: '#ccc' } },
                    axisTick: { show: false },
                    axisLabel: { color: '#666', fontSize: 13, margin: 15 }
                },
                yAxis: {
                    type: 'value',
                    show: false,
                    max: Math.max(...totals) * 1.35
                },
                series: seriesConfig,
                graphic: { elements: [] }
            };

            myChart.setOption({ graphic: { elements: [] } });
            myChart.setOption(option, true);

            // 延迟绘制箭头，确保图表渲染完成
            setTimeout(() => drawArrows(years, totals), 200);
        }

        function drawArrows(years, totals) {
            const graphicElements = [];
            const gapOffset = 35;

            for (let i = 1; i < years.length; i++) {
                const prevTotal = totals[i - 1];
                const currTotal = totals[i];

                if (prevTotal === 0) continue;

                const diff = currTotal - prevTotal;
                const isNegative = diff < 0;
                const growthRateStr = (diff >= 0 ? '+' : '') + Math.round((diff) / prevTotal * 100) + '%';

                const p1Raw = myChart.convertToPixel({ xAxisIndex: 0, yAxisIndex: 0 }, [i - 1, prevTotal]);
                const p2Raw = myChart.convertToPixel({ xAxisIndex: 0, yAxisIndex: 0 }, [i, currTotal]);

                if (!p1Raw || !p2Raw) continue;

                const p1 = [p1Raw[0] + gapOffset, p1Raw[1]];
                const p2 = [p2Raw[0] - gapOffset, p2Raw[1]];

                const badgeColor = isNegative ? '#C00000' : '#37475a';
                const lineColor = isNegative ? '#C00000' : '#555';

                const staggerOffset = (i % 2 === 0) ? 30 : 0;
                const lineTopY = Math.min(p1[1], p2[1]) - 60 - staggerOffset;

                graphicElements.push({
                    type: 'polyline',
                    z: 100,
                    shape: {
                        points: [
                            [p1[0], p1[1] - 25],
                            [p1[0], lineTopY],
                            [p2[0], lineTopY],
                            [p2[0], p2[1] - 35]
                        ]
                    },
                    style: { stroke: lineColor, lineWidth: 1 }
                });

                graphicElements.push({
                    type: 'polygon',
                    z: 100,
                    shape: {
                        points: [
                            [p2[0], p2[1] - 25],
                            [p2[0] - 4, p2[1] - 33],
                            [p2[0] + 4, p2[1] - 33]
                        ]
                    },
                    style: { fill: lineColor }
                });

                const textCenterX = (p1[0] + p2[0]) / 2;
                const textCenterY = lineTopY;

                graphicElements.push({
                    type: 'circle',
                    z: 100,
                    shape: { cx: textCenterX, cy: textCenterY, r: 18 },
                    style: { fill: badgeColor }
                });

                const textLength = growthRateStr.length;

                graphicElements.push({
                    type: 'text',
                    z: 100,
                    style: {
                        text: growthRateStr,
                        x: textCenterX - (textLength * 3.5),
                        y: textCenterY - 5,
                        fill: '#fff',
                        fontSize: 11,
                        fontWeight: 'bold'
                    }
                });
            }

            myChart.setOption({ graphic: { elements: graphicElements } }, false);
        }

        // ================= 初始化演示 =================
        const initMockData = [
            ['年度', '东南亚', '北欧', '美国'],
            ['2024', 48, 78, 80],
            ['2025', 56, 120, 157],
            ['2026', 61, 202, 260],
            ['2027', 40, 90, 120]
        ];
        
        currentJsonData = initMockData;
        currentCategories = initMockData[0].slice(1);
        
        currentCategories.forEach((_, i) => {
            customColors[i] = colorThemes.business[i % colorThemes.business.length];
        });
        
        renderTablePreview(initMockData);
        renderChartFromExcel(initMockData);

        let resizeTimer;
        window.addEventListener('resize', function () {
            clearTimeout(resizeTimer);
            myChart.resize();
            resizeTimer = setTimeout(() => {
                if (currentJsonData) {
                    renderChartFromExcel(currentJsonData);
                }
            }, 300);
        });
    </script>
</body>

</html>
